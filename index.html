<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ถ่ายรูปประจำตัว</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Kanit', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
    }

    /* Ambient glow behind camera */
    body::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 179, 237, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      color: #e2e8f0;
      z-index: 1;
    }

    .title span {
      color: #63b3ed;
    }

    #camera-wrap {
      position: relative;
      width: 300px;
      height: 400px;
      overflow: hidden;
      background: #000;
      border-radius: 24px;
      box-shadow:
        0 0 0 1px rgba(99, 179, 237, 0.15),
        0 8px 32px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(99, 179, 237, 0.06);
      z-index: 1;
    }

    #video, #capturedCanvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #0a0a0f;
    }

    #capturedCanvas { display: none; }

    /* Avatar overlay using CSS mask */
    #overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    .overlay-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 28px;
      height: 28px;
      z-index: 6;
      pointer-events: none;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: #63b3ed;
      border-radius: 2px;
    }
    .corner-tl { top: 40px; left: 24px; }
    .corner-tl::before { width: 28px; height: 3px; top: 0; left: 0; }
    .corner-tl::after { width: 3px; height: 28px; top: 0; left: 0; }

    .corner-tr { top: 40px; right: 24px; }
    .corner-tr::before { width: 28px; height: 3px; top: 0; right: 0; }
    .corner-tr::after { width: 3px; height: 28px; top: 0; right: 0; }

    .corner-bl { bottom: 40px; left: 24px; }
    .corner-bl::before { width: 28px; height: 3px; bottom: 0; left: 0; }
    .corner-bl::after { width: 3px; height: 28px; bottom: 0; left: 0; }

    .corner-br { bottom: 40px; right: 24px; }
    .corner-br::before { width: 28px; height: 3px; bottom: 0; right: 0; }
    .corner-br::after { width: 3px; height: 28px; bottom: 0; right: 0; }

    /* Guide text overlay */
    .guide-text {
      position: absolute;
      top: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.7);
      z-index: 7;
      letter-spacing: 0.3px;
    }

    /* Buttons */
    .btns {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 1;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Kanit', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    button:active {
      transform: scale(0.96);
    }

    #btnStart {
      background: linear-gradient(135deg, #63b3ed, #4299e1);
      color: #fff;
      box-shadow: 0 4px 16px rgba(66, 153, 225, 0.3);
    }
    #btnStart:hover { box-shadow: 0 4px 24px rgba(66, 153, 225, 0.5); }

    #btnCapture {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: #fff;
      box-shadow: 0 4px 16px rgba(72, 187, 120, 0.3);
    }

    #btnUpload {
      background: linear-gradient(135deg, #63b3ed, #4299e1);
      color: #fff;
      display: none;
      box-shadow: 0 4px 16px rgba(66, 153, 225, 0.3);
    }

    #btnRetake {
      background: transparent;
      color: #63b3ed;
      border: 2px solid rgba(99, 179, 237, 0.4);
      display: none;
    }
    #btnRetake:hover { border-color: #63b3ed; }

    /* Status */
    #status {
      margin-top: 14px;
      min-height: 24px;
      color: #a0aec0;
      text-align: center;
      font-size: 13px;
      font-weight: 300;
      max-width: 300px;
      line-height: 1.6;
      z-index: 1;
    }

    /* Success animation */
    @keyframes successPulse {
      0% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.4); }
      70% { box-shadow: 0 0 0 12px rgba(72, 187, 120, 0); }
      100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
    }

    .success-ring {
      animation: successPulse 1.5s ease-out;
      border-radius: 24px;
    }

    /* Scanning line animation */
    @keyframes scanLine {
      0% { top: 40px; opacity: 1; }
      50% { opacity: 0.6; }
      100% { top: calc(100% - 40px); opacity: 1; }
    }

    .scan-line {
      position: absolute;
      left: 24px;
      right: 24px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #63b3ed, transparent);
      z-index: 8;
      pointer-events: none;
      animation: scanLine 2.5s ease-in-out infinite alternate;
      display: none;
    }

    .scanning .scan-line {
      display: block;
    }

    /* Success modal overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: #1a1a2e;
      border: 1px solid rgba(72, 187, 120, 0.3);
      border-radius: 24px;
      padding: 40px 32px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(72, 187, 120, 0.1);
      animation: modalIn 0.4s ease;
    }

    @keyframes modalIn {
      0% { opacity: 0; transform: scale(0.9) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #48bb78, #38a169);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 14px;
      font-weight: 300;
      color: #a0aec0;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .modal-close-btn {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Kanit', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(72, 187, 120, 0.3);
    }

    .modal-close-btn:active {
      transform: scale(0.96);
    }

    .modal-close-btn:hover {
      box-shadow: 0 4px 24px rgba(72, 187, 120, 0.5);
    }
  </style>
</head>
<body>

<div class="title">ถ่ายรูป<span>ประจำตัว</span></div>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="capturedCanvas"></canvas>

  <div class="guide-text" id="guideText">วางใบหน้าให้อยู่ในกรอบ</div>

  <!-- Corner brackets -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Scan line -->
  <div class="scan-line"></div>

  <!-- Avatar silhouette overlay -->
  <div id="overlay">
    <svg class="overlay-svg" viewBox="0 0 300 400" preserveAspectRatio="xMidYMid slice">
      <defs>
        <!-- Avatar cutout shape -->
        <clipPath id="avatarClip">
          <!-- Head -->
          <ellipse cx="150" cy="155" rx="58" ry="72"/>
          <!-- Neck -->
          <rect x="127" y="220" width="46" height="30" rx="5"/>
          <!-- Shoulders -->
          <path d="M65,340 C70,300 100,270 130,255 L170,255 C200,270 230,300 235,340 L235,400 L65,400 Z"/>
        </clipPath>
      </defs>

      <!-- Dark overlay with avatar hole -->
      <mask id="avatarMask">
        <rect width="300" height="400" fill="white"/>
        <!-- Head -->
        <ellipse cx="150" cy="155" rx="58" ry="72" fill="black"/>
        <!-- Neck bridge -->
        <rect x="127" y="218" width="46" height="38" rx="4" fill="black"/>
        <!-- Shoulders/body -->
        <path d="M60,400 C65,330 95,290 130,265 L170,265 C205,290 235,330 240,400 Z" fill="black"/>
      </mask>

      <!-- Semi-transparent dark overlay with cutout -->
      <rect width="300" height="400" fill="rgba(10,10,15,0.75)" mask="url(#avatarMask)"/>

      <!-- Avatar outline glow -->
      <!-- Head outline -->
      <ellipse cx="150" cy="155" rx="58" ry="72"
        fill="none" stroke="rgba(99,179,237,0.35)" stroke-width="1.5"/>
      <!-- Shoulder outline -->
      <path d="M60,400 C65,330 95,290 130,265 L170,265 C205,290 235,330 240,400"
        fill="none" stroke="rgba(99,179,237,0.35)" stroke-width="1.5"/>
    </svg>
  </div>
</div>

<div class="btns">
  <button id="btnStart"   type="button">เปิดกล้อง</button>
  <button id="btnCapture" type="button" disabled>ถ่ายรูป</button>
  <button id="btnUpload"  type="button">อัปโหลด</button>
  <button id="btnRetake"  type="button">ถ่ายใหม่</button>
</div>
<div id="status">กดปุ่มเพื่อเปิดกล้อง</div>

<!-- Success Modal -->
<div class="modal-overlay" id="successModal">
  <div class="modal-box">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="modal-title">อัปโหลดสำเร็จ</div>
    <div class="modal-desc">รูปภาพของคุณถูกบันทึกเรียบร้อยแล้ว<br>คุณสามารถปิดหน้านี้ได้</div>
    <button class="modal-close-btn" id="btnCloseModal">ปิดหน้านี้</button>
  </div>
</div>

<script>
  // ============================================================
  // ⚠️ แก้ URL นี้ให้ตรงกับ n8n webhook ของคุณ
  // ============================================================
  var UPLOAD_URL = "https://avatrsalecb.okontek.com/webhook/liff-upload";

  var video      = document.getElementById("video");
  var canvas     = document.getElementById("capturedCanvas");
  var cameraWrap = document.getElementById("camera-wrap");
  var guideText  = document.getElementById("guideText");
  var btnStart   = document.getElementById("btnStart");
  var btnCapture = document.getElementById("btnCapture");
  var btnUpload  = document.getElementById("btnUpload");
  var btnRetake  = document.getElementById("btnRetake");
  var statusEl   = document.getElementById("status");

  var stream       = null;
  var capturedBlob = null;

  function startCamera() {
    statusEl.textContent = "กำลังขอ permission กล้อง...";
    if (stream) stopCamera();

    capturedBlob = null;
    canvas.style.display     = "none";
    video.style.display      = "block";
    btnUpload.style.display  = "none";
    btnRetake.style.display  = "none";
    btnCapture.style.display = "inline-block";
    btnCapture.disabled      = true;
    guideText.textContent    = "วางใบหน้าให้อยู่ในกรอบ";

    navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    })
    .then(function(s) {
      stream = s;
      video.srcObject = stream;
      cameraWrap.classList.add("scanning");
      video.onloadedmetadata = function() {
        video.play().then(function() {
          btnCapture.disabled = false;
          btnStart.style.display = "none";
          statusEl.textContent = "จัดใบหน้าให้อยู่ในกรอบแล้วกดถ่ายรูป";
        });
      };
    })
    .catch(function(err) {
      console.error("Camera error:", err);
      statusEl.textContent = "ไม่สามารถเปิดกล้องได้: " + (err.name || "") + " - " + (err.message || "");
    });
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(function(t) { t.stop(); });
      stream = null;
    }
    video.srcObject = null;
    cameraWrap.classList.remove("scanning");
  }

  function capturePhoto() {
    var vw = video.videoWidth;
    var vh = video.videoHeight;
    if (!vw || !vh) { statusEl.textContent = "ยังไม่พบภาพจากกล้อง"; return; }

    canvas.width  = vw;
    canvas.height = vh;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, vw, vh);

    canvas.toBlob(function(blob) {
      if (!blob) { statusEl.textContent = "จับภาพไม่สำเร็จ"; return; }
      capturedBlob = blob;

      video.style.display      = "none";
      canvas.style.display     = "block";
      btnUpload.style.display  = "inline-block";
      btnRetake.style.display  = "inline-block";
      btnCapture.style.display = "none";
      cameraWrap.classList.remove("scanning");
      guideText.textContent    = "ตรวจสอบรูปก่อนอัปโหลด";
      statusEl.textContent     = "ถ่ายรูปแล้ว กดอัปโหลดได้เลย";
    }, "image/jpeg", 0.9);
  }

  function retakePhoto() {
    capturedBlob = null;
    canvas.style.display     = "none";
    video.style.display      = "block";
    btnUpload.style.display  = "none";
    btnRetake.style.display  = "none";
    btnCapture.style.display = "inline-block";
    btnCapture.disabled      = false;
    btnUpload.disabled       = false;
    btnUpload.textContent    = "อัปโหลด";
    guideText.textContent    = "วางใบหน้าให้อยู่ในกรอบ";
    statusEl.textContent     = "พร้อมถ่ายใหม่";
    if (!stream) startCamera();
    else cameraWrap.classList.add("scanning");
  }

  function uploadPhoto() {
    if (!capturedBlob) { statusEl.textContent = "ยังไม่มีรูปให้ส่ง"; return; }
    btnUpload.disabled = true;
    statusEl.textContent = "กำลังอัปโหลด...";

    var formData = new FormData();
    formData.append("image", capturedBlob, "capture.jpg");

    fetch(UPLOAD_URL, { method: "POST", body: formData, mode: "cors" })
      .then(function(res) {
        return res.json().then(function(d) { return { ok: res.ok, data: d }; });
      })
      .then(function(result) {
        if (result.ok && result.data.ok) {
          statusEl.textContent    = "อัปโหลดสำเร็จ";
          btnUpload.textContent   = "สำเร็จ";
          btnUpload.style.background = "linear-gradient(135deg, #48bb78, #38a169)";
          cameraWrap.classList.add("success-ring");
          guideText.textContent   = "อัปโหลดเรียบร้อย";
          stopCamera();
          // Show success modal
          document.getElementById("successModal").classList.add("active");
        } else {
          throw new Error(result.data.message || JSON.stringify(result.data));
        }
      })
      .catch(function(err) {
        console.error("Upload error:", err);
        statusEl.textContent = "อัปโหลดไม่สำเร็จ: " + (err.message || "Unknown");
        btnUpload.disabled = false;
      });
  }

  btnStart.addEventListener("click", startCamera);
  btnCapture.addEventListener("click", capturePhoto);
  btnRetake.addEventListener("click", retakePhoto);
  btnUpload.addEventListener("click", uploadPhoto);
  document.getElementById("btnCloseModal").addEventListener("click", function() {
    try { window.close(); } catch(e) {}
    // If window.close doesn't work (some browsers block it)
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Kanit,sans-serif;color:#a0aec0;font-size:16px;text-align:center;padding:20px;">เสร็จเรียบร้อย คุณสามารถปิดหน้านี้ได้</div>';
  });
  window.addEventListener("beforeunload", stopCamera);
</script>
</body>
</html>
